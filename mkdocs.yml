site_name: LUMINA Standard
site_url: https://lumina.sabercraft.org/
site_description: A lightsaber choreography standard for recording, teaching, sharing, and safely performing choreographed saber combat.
site_author: Lumina Federation LLC

repo_name: LuminaFederation/lumina-standard
repo_url: https://github.com/LuminaFederation/lumina-standard
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/images/lumina-sabercraft-mark.svg
  favicon: assets/images/lumina-favicon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.action.view
    - toc.follow
  palette:
    - scheme: slate
      primary: black
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: red
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

extra_css:
  - assets/stylesheets/sabercraft.css

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://sabercraft.org/
      name: SaberCraft
    - icon: fontawesome/brands/github
      link: https://github.com/LuminaFederation/lumina-standard
      name: LUMINA Standard on GitHub

copyright: Copyright &copy; Lumina Federation LLC. SaberCraft is the founding school/community of LUMINA.

nav:
  - Home: index.md
  - Learn:
      - Start Here / Beginner Path: start-here.md
      - For Schools: for-schools.md
      - Why Notation Matters: why-notation-matters.md
      - Downloads: downloads.md
      - Learn with SaberCraft: learn.md
  - The Standard:
      - Overview: standard.md
      - Governance: versioning-and-governance.md
      - Licensing: licensing.md
      - Glossary: glossary.md
  - Notation:
      - Overview: notation/index.md
      - Targets: notation/targets.md
      - Attacks: notation/attacks.md
      - Parries: notation/parries.md
      - Legend: notation/legend.md
      - Examples: notation/examples.md
      - Independent School Example: examples/academy-a-example.md
  - Core Movements:
      - Movement Library: core/index.md
      - Core Library:
          - CM-A: core/cm-a.md
  - Games:
      - Overview: games/index.md
      - Rules: games/rules.md
      - Scoring: games/scoring.md
      - Power Plays: games/power-plays.md
  - Contribute: contributing-and-submissions.md
